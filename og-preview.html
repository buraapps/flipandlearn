<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OG Image Preview — Flip & Learn</title>
  <style>
    /* This file exists ONLY to render a 1200x630 PNG for Open Graph / social previews.
       Open in a browser at 100% zoom, take a screenshot of the .og-card div,
       save as /Volumes/Data/BuraApps/web/og-image.png. */

    body{margin:0;padding:40px;background:#222;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;justify-content:center;align-items:flex-start}

    .og-card{
      width:1200px;height:630px;
      background:linear-gradient(135deg,#6759C7 0%,#3A3589 100%);
      display:flex;align-items:center;
      padding:80px;box-sizing:border-box;
      position:relative;
      box-shadow:0 0 40px rgba(0,0,0,.5);
      overflow:hidden;
    }

    /* Subtle decorative blob in top-right */
    .og-card::before{
      content:"";position:absolute;top:-100px;right:-100px;
      width:400px;height:400px;border-radius:50%;
      background:radial-gradient(circle,rgba(255,255,255,.08) 0%,transparent 70%);
    }

    .og-icon{
      width:240px;height:240px;border-radius:48px;
      flex-shrink:0;
      box-shadow:0 12px 40px rgba(0,0,0,.25);
      background:white;
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;
    }
    .og-icon img{width:100%;height:100%;object-fit:cover}

    .og-text{margin-left:64px;color:white;flex:1;min-width:0}

    .og-title{
      font-size:88px;font-weight:700;
      letter-spacing:-1.5px;line-height:1;
      margin:0 0 18px 0;
    }

    .og-subtitle{
      font-size:34px;font-weight:500;
      opacity:.92;line-height:1.25;
      margin:0 0 36px 0;
    }

    .og-specs{
      font-size:22px;font-weight:500;
      opacity:.8;letter-spacing:.2px;
    }

    .og-domain{
      position:absolute;bottom:36px;right:48px;
      color:white;opacity:.7;
      font-size:20px;font-weight:600;letter-spacing:.5px;
    }

    /* Helper note shown only in this preview file, not in the rendered card */
    .helper{
      position:fixed;top:8px;left:50%;transform:translateX(-50%);
      color:#aaa;font-size:13px;font-family:monospace;
      background:rgba(0,0,0,.5);padding:6px 12px;border-radius:4px;
    }
  </style>
</head>
<body>

<div class="helper">Screenshot just the lavender card → save as og-image.png (1200×630)</div>

<div class="og-card">
  <div class="og-icon">
    <img src="icon.png" alt="Flip & Learn icon">
  </div>
  <div class="og-text">
    <h1 class="og-title">Flip &amp; Learn</h1>
    <p class="og-subtitle">Word card game for kids</p>
    <p class="og-specs">9 languages · 21 categories · No ads · Ages 4+</p>
  </div>
  <div class="og-domain">flipandlearn.app</div>
</div>

</body>
</html>
